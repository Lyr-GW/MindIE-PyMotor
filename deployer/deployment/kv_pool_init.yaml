apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindie-ms-kv-pool
  labels:
    app: mindie-ms-kv-pool
  namespace: mindie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mindie-ms-kv-pool
  template:
    metadata:
      labels:
        app: mindie-ms-kv-pool
        deploy-name: mindie-ms-kv-pool
    spec:
      terminationGracePeriodSeconds: 0
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1001
      containers:
        - image: mindie:1.0.0-aarch64-800I-A2
          imagePullPolicy: IfNotPresent
          name: mindie-ms-kv-pool
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: "RuntimeDefault"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CONFIGMAP_PATH
              value: /mnt/configmap
            - name: ROLE
              value: kv_pool
          command: ["/bin/bash", "-c", "
              source /mnt/configmap/boot.sh; \n
          "]
          resources:
            requests:
              memory: "2Gi"
              cpu: "4"
            limits:
              memory: "4Gi"
              cpu: "8"
          volumeMounts:
            - name: boot-bash-script
              mountPath: /mnt/configmap/boot.sh
              subPath: boot.sh
            - name: coredump
              mountPath: /var/coredump
            - name: ascend-driver
              mountPath: /usr/local/Ascend/driver
      volumes:
        - name: boot-bash-script
          configMap:
            name: boot-bash-script
            defaultMode: 0550
        - name: coredump
          hostPath:
            path: /var/coredump
            type: DirectoryOrCreate
        - name: ascend-driver
          hostPath:
            path: /usr/local/Ascend/driver
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: mindie-ms-kv-pool
  name: kvp-master
  namespace: mindie
spec:
  ports:
  - port: 50088
    protocol: TCP
    targetPort: 50088
  selector:
    app: mindie-ms-kv-pool
  sessionAffinity: None
  type: ClusterIP
status:
  loadBalancer: {}